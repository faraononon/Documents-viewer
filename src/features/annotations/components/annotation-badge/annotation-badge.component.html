<div
  class="annotation-badge"
  #drag
  (mousedown)="startDrag($event)"
  [style.left.px]="badgeWidth()"
  [style.top.px]="badgeHeight()"
>
  <span class="badge-icon">💬</span>
  <span class="badge-text">{{ annotation() }}</span>
  <button class="badge-close" (click)="deleteAnnotation()">X</button>
</div>
